<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>NARSA Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0b1120; color: #cbd5e1; font-family: sans-serif; }
        .glass { background: #1e293b; border: 1px solid #334155; }
        .selected { border: 2px solid #3b82f6 !important; }
        .correct { background: #065f46 !important; border-color: #059669 !important; color: white; }
        .wrong { background: #991b1b !important; border-color: #dc2626 !important; color: white; }
    </style>
</head>
<body class="p-6">

    <div id="app" class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-4 gap-6">
        </div>

    <script>
        const questions = [
            { q: "وضع صفائح تسجيل مزورة على المركبة بشكل متعمد كايتخبر جنحة كيتعاقب عليها:", o: ["بعقوبة حبسية", "بإيداع المركبة بالحجز", "بإتلاف المركبة", "بمصادرة المركبة لفائدة الدولة"], c: [1, 2, 4], img: "q1.webp" },
            { q: "السؤال الثاني...", o: ["الخيار 1", "الخيار 2", "الخيار 3", "الخيار 4"], c: [3], img: "q2.jpg" }
        ];

        let state = { 
            idx: 0, 
            userAnswers: new Array(questions.length).fill(null).map(() => []), 
            isSubmitted: false, 
            view: 'quiz' 
        };

        function render() {
            const app = document.getElementById('app');
            
            if (state.view === 'result') {
                const score = state.userAnswers.filter((ans, i) => 
                    JSON.stringify(ans.sort()) === JSON.stringify(questions[i].c.sort())
                ).length;
                app.innerHTML = `
                    <div class="col-span-4 glass p-20 rounded-xl text-center">
                        <h1 class="text-4xl font-bold mb-6">نتيجتك النهائية: ${score} / ${questions.length}</h1>
                        <button onclick="location.reload()" class="bg-blue-600 px-8 py-3 rounded-xl font-bold">إعادة الاختبار</button>
                    </div>`;
                return;
            }

            const q = questions[state.idx];
            app.innerHTML = `
                <div class="col-span-1 glass p-6 rounded-xl flex flex-col gap-6">
                    <div class="text-sm">السؤال ${state.idx + 1} / ${questions.length}</div>
                    <div class="grid grid-cols-2 gap-2">
                        ${[1, 2, 3, 4].map(n => `<div class="p-4 bg-slate-900 rounded border border-slate-700 text-center">${n}</div>`).join('')}
                    </div>
                    <button onclick="submit()" class="w-full bg-emerald-600 py-3 rounded font-bold">Valider</button>
                    <button onclick="next()" class="w-full bg-blue-600 py-3 rounded font-bold">السؤال التالي</button>
                </div>
                <div class="col-span-3 flex flex-col gap-6">
                    <div class="glass p-2 rounded-xl"><img src="static/images/${q.img}" class="w-full rounded-lg"></div>
                    <div class="glass p-6 rounded-xl">
                        <h2 class="text-xl mb-6">${q.q}</h2>
                        <div class="space-y-3">
                            ${q.o.map((opt, i) => {
                                const id = i + 1;
                                const isSel = state.userAnswers[state.idx].includes(id);
                                let cls = state.isSubmitted ? (questions[state.idx].c.includes(id) ? 'correct' : (isSel ? 'wrong' : '')) : '';
                                return `<button onclick="toggle(${id})" class="w-full text-right p-4 rounded border border-slate-600 ${isSel?'selected':''} ${cls}">${opt}</button>`;
                            }).join('')}
                        </div>
                    </div>
                </div>`;
        }

        function toggle(id) {
            if(state.isSubmitted) return;
            const arr = state.userAnswers[state.idx];
            const i = arr.indexOf(id);
            if(i > -1) arr.splice(i, 1); else arr.push(id);
            render();
        }

        function submit() { state.isSubmitted = true; render(); }

        function next() {
            if (state.idx < questions.length - 1) {
                state.idx++;
                state.isSubmitted = false;
                render();
            } else {
                state.view = 'result';
                render();
            }
        }

        render();
    </script>
</body>
</html>
