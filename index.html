<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NARSA Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; background: #0f172a; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .option-active { background: #3b82f6 !important; color: white; border-color: #60a5fa !important; }
        .bg-correct { background: #065f46 !important; border-color: #059669 !important; }
        .bg-wrong { background: #991b1b !important; border-color: #dc2626 !important; }
    </style>
</head>
<body class="min-h-screen p-2 flex flex-col text-slate-200">

    <div id="start-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950">
        <button onclick="startQuiz()" class="bg-blue-600 text-white px-10 py-5 rounded-2xl text-2xl font-bold hover:bg-blue-500">ابدأ الاختبار</button>
    </div>

    <audio id="audio-q"></audio>
    <audio id="audio-exp"></audio>

    <div id="main-container" class="max-w-5xl mx-auto w-full flex flex-col md:grid md:grid-cols-3 gap-4 mt-4">
        </div>

<script>
const questions = [
    { q: "تقرب من طريق فيها حدبات؟", o: ["نعم", "لا"], c: [1], audioQ: "q8.mp3" },
    { q: "كيشمل خصم النقط فنفس الوقت جميع أصناف رخصة السياقة اللي حصلت عليها:", o: ["صحيح", "خطأ"], c: [1], audioQ: "q10.mp3" },
    { q: "هاد العلامة كتعلم على:", o: ["طريق ذات أولوية عند ملتقى الطرق اللي جاي", "طريق ذات أولوية المرور", "ملتقى الطرق", "حق الأسبقية للي جاي من ليمن"], c: [1], audioQ: "q11.mp3" },
    { q: "كتمكن تقنية البلوتوث من ربط الهاتف النقال بالنظام المدمج للسيارة:", o: ["نعم", "لا"], c: [1], audioQ: "q12.mp3" },
    { q: "هاد اللوحة كتعلم على: محطة الاستراحة", o: ["نعم", "لا"], c: [1], audioQ: "q13.mp3" },
];

    let state = { idx: 0, userAnswers: questions.map(() => []), expired: questions.map(() => false), timeLeft: 15, timer: null };

    function startQuiz() {
        document.getElementById('start-screen').style.display = 'none';
        loadQ();
    }

    function loadQ() {
        
        clearInterval(state.timer);
        const q = questions[state.idx];
        document.getElementById('main-container').innerHTML = `
            <div class="flex flex-col gap-4 order-1 md:col-span-2">
                <div class="bg-slate-950 rounded-xl border border-slate-700 aspect-video flex items-center justify-center overflow-hidden">
                    <img src="static/images/q${state.idx + 1}.webp" class="w-full h-full object-cover">
                </div>
                <div class="glass p-4 rounded-xl border border-slate-700">
                    <p class="text-lg font-bold mb-2">${q.q}</p>
                    <div id="options-list" class="space-y-2 text-sm">
                        ${q.o.map((o, i) => `
                            <div class="p-3 rounded-xl border border-slate-700 cursor-pointer flex justify-between items-center" onclick="toggle(${i+1})" id="row-${i+1}">
                                <span>${o}</span>
                                <span class="text-slate-500">......... ${i+1}</span>
                            </div>`).join('')}
                    </div>
                </div>
            </div>
            <div class="glass rounded-xl p-4 border border-slate-700 flex flex-col gap-4 order-2">
                <div id="timer" class="text-center font-bold text-xl text-red-500">15</div>
                <div class="grid grid-cols-2 gap-2" id="btn-grid">
                    ${[1,2,3,4].map(n => `<button class="py-4 rounded-xl font-bold border bg-slate-800 border-slate-700" onclick="toggle(${n})" id="btn-${n}">${n}</button>`).join('')}
                </div>
                <button onclick="nextQ()" class="bg-emerald-600 py-4 rounded-xl font-bold text-lg">Valider</button>
            </div>`;
    
        updateSelectionUI();
        const audio = document.getElementById('audio-q');
        audio.src = `static/sounds/${q.audioQ}`;
        audio.onended = () => startTimer();
        audio.play();
    }

    function updateSelectionUI() {
        const answers = state.userAnswers[state.idx];
        for (let i = 1; i <= 4; i++) {
            const row = document.getElementById(`row-${i}`);
            const btn = document.getElementById(`btn-${i}`);
            if (row && btn) {
                if (answers.includes(i)) {
                    row.classList.add('option-active');
                    btn.classList.add('bg-blue-600');
                    btn.classList.remove('bg-slate-800');
                } else {
                    row.classList.remove('option-active');
                    btn.classList.remove('bg-blue-600');
                    btn.classList.add('bg-slate-800');
                }
            }
        }
    }

    function toggle(id) {
        let arr = state.userAnswers[state.idx];
        if (arr.includes(id)) state.userAnswers[state.idx] = arr.filter(x => x !== id);
        else state.userAnswers[state.idx].push(id);
        updateSelectionUI(); // Updates only CSS, audio continues playing
    }

    function startTimer() {
        state.timeLeft = 15;
        state.timer = setInterval(() => {
            state.timeLeft--;
            const timerEl = document.getElementById('timer');
            if(timerEl) timerEl.innerText = state.timeLeft;
            if (state.timeLeft <= 0) {
                clearInterval(state.timer);
                state.expired[state.idx] = true;
                nextQ();
            }
        }, 1000);
    }

    function nextQ() {
        clearInterval(state.timer);
        if (state.idx < questions.length - 1) { state.idx++; loadQ(); }
        else showResults();
    }

    function showResults() {
        let correct = questions.filter((q, i) => !state.expired[i] && JSON.stringify(state.userAnswers[i].sort()) === JSON.stringify(q.c.sort())).length;
        document.getElementById('main-container').innerHTML = `<div class="glass p-10 col-span-3 text-center">
            <h1 class="text-3xl font-bold">النتيجة: ${correct}/${questions.length}</h1>
            <div class="mt-6 grid grid-cols-5 gap-2">${questions.map((_, i) => `<button onclick="review(${i})" class="p-4 bg-slate-800 rounded">س${i+1}</button>`).join('')}</div>
        </div>`;
    }

    function review(i) {
        const q = questions[i];
        document.getElementById('main-container').innerHTML = `<div class="glass p-10 col-span-3">
            <h2 class="text-xl font-bold mb-4">${q.q}</h2>
            ${q.o.map((o, n) => `<div class="p-3 mb-2 rounded ${q.c.includes(n+1) ? 'bg-correct' : (state.userAnswers[i].includes(n+1) ? 'bg-wrong' : 'border border-slate-700')}">${o}</div>`).join('')}
            <p class="mt-4 italic text-sm text-slate-400">${q.exp}</p>
            <button onclick="showResults()" class="mt-6 bg-blue-600 px-6 py-2 rounded">العودة للنتائج</button>
        </div>`;
    }
</script>
</body>
</html>
