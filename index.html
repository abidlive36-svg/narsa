<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NARSA Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; background: #0f172a; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .option-active { background: #3b82f6 !important; border-color: #60a5fa !important; }
        .correct { background: #059669 !important; border-color: #10b981 !important; }
        .wrong { background: #dc2626 !important; border-color: #ef4444 !important; }
    </style>
</head>
<body class="min-h-screen p-4 text-slate-200">

    <div class="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-4 mt-8">
        
        <div class="glass rounded-xl p-6 border border-slate-700 flex flex-col gap-6 order-2 md:order-1">
            <input type="range" class="w-full accent-blue-500">
            <div id="btn-grid" class="grid grid-cols-2 gap-2">
                </div>
            <button onclick="checkAnswer()" class="bg-blue-600 py-3 rounded-xl font-bold">التصحيح</button>
            <button onclick="nextQ()" class="bg-emerald-600 py-3 rounded-xl font-bold">السؤال التالي</button>
        </div>

        <div class="md:col-span-2 flex flex-col gap-4 order-1 md:order-2">
            <div class="bg-black rounded-xl border border-slate-700 overflow-hidden">
                <img id="q-img" src="" class="w-full h-auto object-contain" alt="Question Image">
            </div>
            <div class="glass p-6 rounded-xl border border-slate-700">
                <p id="q-text" class="text-xl font-bold mb-4"></p>
                <div id="options" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <script>
        // Updated questions logic
        const questions = [
            { q: "عند المراقبة في حالة رخصة السياقة مزورة، يمكن للعربة تعرض للحجز:", o: ["نعم", "لا"], c: [1], img: "Screenshot (83).jpg" },
            { q: "الوضعية الصحيحة لمقعد ديال السياقة كتأثر فظهور العلامات الأولى فالتعب:", o: ["نعم", "لا"], c: [1], img: "Screenshot (84).jpg" },
            { q: "من الممكن نخلص الغرامة لعون محرر المحضر:", o: ["بالفلوس", "بشيك بنكي باسم صاحب المخالفة", "بشيك بنكي باسم احد الراكبين"], c: [2], img: "Screenshot (85).jpg" },
            { q: "على الطريق السيار فرق السرعة مع هاذ الحافلة يمكن يكون على الأقل:", o: ["20 كلم فالساعة", "40 كلم فالساعة", "50 كلم فالساعة"], c: [2], img: "Screenshot (86).jpg" },
            { q: "من القواعد ديال السياقة الإقتصادية:", o: ["الإكثار من عمليات الوقوف", "التقليل من عمليات الوقوف", "استباق التغييرات فوتيرة السير"], c: [2, 3], img: "Screenshot (87).jpg" },
            { q: "هاد العلامة كتعلن على منعرجات متابعة:", o: ["على بعد 150 مترو", "على بعد 5 كيلومتر", "على طول 150 مترو", "على طول 5 كيلومتر"], c: [4], img: "Screenshot (88).jpg" },
            { q: "أثناء السير، لازم متوصلش نسبة الكحول في اللتر من الهواء المنبعث من الفم:", o: ["0,02 مليغرام", "0,05 مليغرام", "0,10 مليغرام"], c: [1], img: "Screenshot (89).jpg" },
            { q: "العلامة اللي كتدل على المكان ديال مؤشر التآكل موجودة ف:", o: ["1", "2"], c: [2], img: "Screenshot (90).jpg" },
            { q: "بعد ما سلمت رخصة السياقة الملغاة بسبب فقدان جميع النقط مايمكنش ليا نجتاز الامتحان من جديد إلا بعد:", o: ["3 شهور", "6 شهور", "9 شهور", "12 شهر"], c: [4], img: "Screenshot (91).jpg" },
            { q: "فالمملكة المغربية، عدد القتلى ديال الراجلين كيمثل:", o: ["10% من قتلى حوادث السير", "20% من قتلى حوادث السير", "أكثر من 25% من قتل حوادث السير"], c: [3], img: "Screenshot (92).jpg" }
        ];

        let idx = 0, selected = [], answered = false;

        function loadQ() {
            selected = []; answered = false;
            const d = questions[idx];
            document.getElementById('q-img').src = `static/images/${d.img}`;
            document.getElementById('q-text').innerText = d.q;
            
            const list = document.getElementById('options');
            const btns = document.getElementById('btn-grid');
            list.innerHTML = '';
            btns.innerHTML = '';
            
            d.o.forEach((opt, i) => {
                list.innerHTML += `<div class="p-3 border border-slate-600 rounded-lg cursor-pointer hover:border-slate-400" onclick="toggle(${i+1})" id="row-${i+1}">
                    ${opt} ......................................... ${i+1}
                </div>`;
                btns.innerHTML += `<button class="bg-slate-800 py-4 rounded-xl font-bold border border-slate-700" onclick="toggle(${i+1})" id="btn-${i+1}">${i+1}</button>`;
            });
        }

        function toggle(id) {
            if (answered) return;
            const btn = document.getElementById(`btn-${id}`);
            const row = document.getElementById(`row-${id}`);
            if (selected.includes(id)) {
                selected = selected.filter(x => x !== id);
                btn.classList.remove('option-active');
                row.classList.remove('option-active');
            } else {
                selected.push(id);
                btn.classList.add('option-active');
                row.classList.add('option-active');
            }
        }

        function checkAnswer() {
            if (answered) return;
            answered = true;
            const correct = questions[idx].c;
            correct.forEach(id => {
                document.getElementById(`row-${id}`).classList.add('correct');
                document.getElementById(`btn-${id}`).classList.add('correct');
            });
            selected.forEach(id => {
                if(!correct.includes(id)) {
                    document.getElementById(`row-${id}`).classList.add('wrong');
                    document.getElementById(`btn-${id}`).classList.add('wrong');
                }
            });
        }

        function nextQ() {
            if (idx < questions.length - 1) { idx++; loadQ(); }
        }

        window.onload = loadQ;
    </script>
</body>
</html>
