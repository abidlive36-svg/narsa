<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>NARSA Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0b1120; color: #cbd5e1; font-family: sans-serif; }
        .bg-custom { background: #111827; }
        .glass { background: #1e293b; border: 1px solid #334155; }
        .selected { border: 2px solid #10b981 !important; }
        .correct { background: #065f46 !important; border-color: #059669 !important; }
        .wrong { background: #991b1b !important; border-color: #dc2626 !important; }
    </style>
</head>
<body class="p-4">

    <div id="app" class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-4 gap-6">
        <!-- Content will be injected here -->
    </div>

    <script>
        const questions = [
            { q: "وضع صفائح تسجيل مزورة على المركبة بشكل متعمد كايتخبر جنحة كيتعاقب عليها:", o: ["بعقوبة حبسية", "بإيداع المركبة بالحجز", "بإتلاف المركبة", "بمصادرة المركبة لفائدة الدولة"], c: [1, 2, 4], img: "q1.webp" }
        ];

        let state = { idx: 0, userAnswers: new Array(questions.length).fill(null).map(() => []), isSubmitted: false, view: 'quiz' };

        function render() {
            const app = document.getElementById('app');
            if (state.view === 'result') {
                app.innerHTML = `<div class="col-span-4 text-center p-10 glass rounded-xl"><h1 class="text-3xl mb-4">انتهى الاختبار</h1><button onclick="location.reload()" class="bg-blue-600 px-6 py-2 rounded">إعادة</button></div>`;
                return;
            }

            const q = questions[state.idx];
            app.innerHTML = `
                <!-- Left Sidebar -->
                <div class="col-span-1 glass p-6 rounded-xl flex flex-col gap-6">
                    <div class="space-y-2">
                        <label>مستوى الصوت</label>
                        <input type="range" class="w-full">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        ${[2, 1, 4, 3].map(n => `<button class="p-4 bg-slate-800 rounded border border-slate-600">${n}</button>`).join('')}
                    </div>
                    <button onclick="submit()" class="w-full bg-emerald-600 py-3 rounded font-bold">Valider</button>
                </div>

                <!-- Right Main Content -->
                <div class="col-span-3 flex flex-col gap-6">
                    <div class="glass p-2 rounded-xl">
                        <img src="static/images/${q.img}" class="w-full rounded-lg">
                    </div>
                    <div class="glass p-6 rounded-xl">
                        <h2 class="text-xl mb-6">${q.q}</h2>
                        <div class="space-y-3">
                            ${q.o.map((opt, i) => {
                                const id = i + 1;
                                const isSel = state.userAnswers[state.idx].includes(id);
                                let cls = '';
                                if(state.isSubmitted) cls = q.c.includes(id) ? 'correct' : (isSel ? 'wrong' : '');
                                return `<button onclick="toggle(${id})" class="w-full text-right p-4 rounded border border-slate-600 ${isSel?'selected':''} ${cls}">${opt}</button>`;
                            }).join('')}
                        </div>
                    </div>
                </div>
            `;
        }

        function toggle(id) {
            if(state.isSubmitted) return;
            const arr = state.userAnswers[state.idx];
            const i = arr.indexOf(id);
            if(i > -1) arr.splice(i, 1); else arr.push(id);
            render();
        }

        function submit() { state.isSubmitted = true; render(); }
        render();
    </script>
</body>
</html>
