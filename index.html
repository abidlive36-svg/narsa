<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NARSA Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; background: #0f172a; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .option-active { background: #3b82f6 !important; color: white; border-color: #60a5fa !important; }
        .correct { background: #059669 !important; border-color: #10b981 !important; }
        .wrong { background: #dc2626 !important; border-color: #ef4444 !important; }
    </style>
</head>
<body class="min-h-screen p-2 flex flex-col text-slate-200">

    <div id="start-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950">
        <button onclick="startQuiz()" class="bg-blue-600 text-white px-10 py-5 rounded-2xl text-2xl font-bold hover:bg-blue-500">ابدأ الاختبار</button>
    </div>

    <audio id="audio-q"></audio>
    <audio id="audio-exp"></audio>

    <div class="max-w-5xl mx-auto w-full flex flex-col md:grid md:grid-cols-3 gap-4 mt-4">
        <div class="flex flex-col gap-4 order-1 md:col-span-2">
            <div class="bg-slate-950 rounded-xl border border-slate-700 aspect-video flex items-center justify-center overflow-hidden">
                <img id="q-img" src="" class="w-full h-full object-cover" alt="Question Image">
            </div>
            <div class="glass p-4 rounded-xl border border-slate-700">
                <p id="q-text" class="text-lg font-bold mb-2">يرجى الضغط على ابدأ...</p>
                <div id="options" class="space-y-2 text-sm"></div>
            </div>
        </div>

        <div class="glass rounded-xl p-4 border border-slate-700 flex flex-col gap-4 order-2">
            <div class="grid grid-cols-2 gap-2" id="btn-grid">
                <button class="bg-slate-800 py-4 rounded-xl font-bold border border-slate-700" onclick="toggle(1)" id="btn-1">1</button>
                <button class="bg-slate-800 py-4 rounded-xl font-bold border border-slate-700" onclick="toggle(2)" id="btn-2">2</button>
                <button class="bg-slate-800 py-4 rounded-xl font-bold border border-slate-700" onclick="toggle(3)" id="btn-3">3</button>
                <button class="bg-slate-800 py-4 rounded-xl font-bold border border-slate-700" onclick="toggle(4)" id="btn-4">4</button>
            </div>
            <button onclick="checkAnswer()" class="bg-blue-600 py-4 rounded-xl font-bold text-lg">التصحيح</button>
            <button onclick="nextQ()" class="bg-emerald-600 py-4 rounded-xl font-bold text-lg">السؤال التالي</button>
        </div>
    </div>

    <script>
        const questions = [
            { q: "عند المراقبة في حالة رخصة السياقة مزورة، يمكن للعربة تعرض للحجز:", o: ["نعم", "لا"], c: [1], img: "Screenshot (83).jpg", audioQ: "q83_q.mp3", audioE: "q83_exp.mp3" },
            { q: "الوضعية الصحيحة لمقعد ديال السياقة كتأثر فظهور العلامات الأولى فالتعب:", o: ["نعم", "لا"], c: [1], img: "Screenshot (84).jpg", audioQ: "q84_q.mp3", audioE: "q84_exp.mp3" },
            { q: "من الممكن نخلص الغرامة لعون محرر المحضر:", o: ["بالفلوس", "بشيك بنكي باسم صاحب المخالفة", "بشيك بنكي باسم احد الراكبين"], c: [2], img: "Screenshot (85).jpg", audioQ: "q85_q.mp3", audioE: "q85_exp.mp3" }
            // Add the remaining questions following this exact format...
        ];

        let idx = 0, selected = [], answered = false;

        function startQuiz() {
            document.getElementById('start-screen').style.display = 'none';
            loadQ();
        }

        function loadQ() {
            selected = []; answered = false;
            const d = questions[idx];
            document.getElementById('q-img').src = `static/images/${d.img}`;
            document.getElementById('q-text').innerText = d.q;
            
            // Audio loading logic from your working script
            const qAudio = document.getElementById('audio-q');
            qAudio.src = `static/sounds/${d.audioQ}`;
            qAudio.play();

            const list = document.getElementById('options');
            list.innerHTML = '';
            d.o.forEach((opt, i) => {
                list.innerHTML += `<div class="p-3 rounded-xl border border-slate-700 cursor-pointer hover:bg-slate-700 flex justify-between items-center" onclick="toggle(${i+1})" id="row-${i+1}">
                    <span>${opt}</span> <span class="text-slate-500">......... ${i+1}</span>
                </div>`;
            });
        }

        function toggle(id) {
            if (answered) return;
            const btn = document.getElementById(`btn-${id}`);
            const row = document.getElementById(`row-${id}`);
            const i = selected.indexOf(id);
            if (i > -1) { selected.splice(i, 1); btn.classList.remove('option-active'); row.classList.remove('option-active'); }
            else { selected.push(id); btn.classList.add('option-active'); row.classList.add('option-active'); }
        }

        function checkAnswer() {
            if (answered) return;
            answered = true;
            questions[idx].c.forEach(id => {
                document.getElementById(`row-${id}`).classList.add('correct');
                document.getElementById(`btn-${id}`).classList.add('correct');
            });
            selected.forEach(id => {
                if(!questions[idx].c.includes(id)) {
                    document.getElementById(`row-${id}`).classList.add('wrong');
                    document.getElementById(`btn-${id}`).classList.add('wrong');
                }
            });
        }

        function nextQ() {
            if (idx < questions.length - 1) { 
                idx++; 
                const exp = document.getElementById('audio-exp');
                exp.src = `static/sounds/${questions[idx-1].audioE}`;
                exp.play();
                setTimeout(() => loadQ(), 2000); 
            }
        }
    </script>
</body>
</html>
