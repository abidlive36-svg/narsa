<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Modern NARSA UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0b1120; color: #cbd5e1; font-family: sans-serif; }
        .bg-panel { background: #131b2e; border: 1px solid #1e293b; }
        .selected { background: #1e3a8a !important; border-color: #3b82f6 !important; }
        .btn-option { border-bottom: 1px dashed #475569; display: flex; justify-content: space-between; width: 100%; padding: 10px; cursor: pointer; }
    </style>
</head>
<body class="p-6">

    <div id="app" class="max-w-6xl mx-auto p-4 bg-panel rounded-lg">
        <div id="question-count" class="text-white text-left mb-4 font-bold"></div>
        
        <div class="grid grid-cols-4 gap-6">
            <div class="col-span-1 space-y-4">
                <div class="p-4 bg-[#1e293b] rounded">
                    <div class="text-xs mb-2">مستوى الصوت</div>
                    <div class="h-2 bg-blue-600 rounded"></div>
                </div>
                <div id="control-grid" class="grid grid-cols-2 gap-2"></div>
                <button onclick="checkAnswer()" class="w-full bg-emerald-600 p-4 rounded font-bold text-white">Valider</button>
            </div>

            <div class="col-span-3 bg-black rounded h-[300px] flex items-center justify-center text-gray-500">
                <img id="scenario-img" src="" alt="Scenario" class="max-h-full">
            </div>
        </div>

        <div class="mt-6 p-6 bg-[#1e293b] rounded text-white">
            <h2 id="question-text" class="mb-6 font-bold text-lg"></h2>
            <div id="options-list" class="space-y-4"></div>
        </div>
    </div>

    <script>
        const questions = [
            { q: "عند المراقبة في حالة رخصة السياقة مزورة، يمكن للعربة تعرض للحجز:", o: ["نعم", "لا"], c: [1], img: "Screenshot (83).jpg" },
            { q: "الوضعية الصحيحة لمقعد ديال السياقة كتأثر فظهور العلامات الأولى فالتعوب:", o: ["نعم", "لا"], c: [1], img: "Screenshot (84).jpg" },
            { q: "من الممكن نخلص الغرامة لعون محرر المحضر:", o: ["بالفلوس", "شيك بنكي باسم صاحب المخالفة", "شيك بنكي باسم احد الراكبين"], c: [2], img: "Screenshot (85).jpg" },
            { q: "على الطريق السيار فرق السرعة مع هاد الحافلة يمكن يكون على الأقل:", o: ["20 كلم فالساعة", "40 كلم فالساعة", "50 كلم فالساعة"], c: [3], img: "Screenshot (86).jpg" },
            { q: "من القواعد ديال السياقة الإقتصادية:", o: ["الإكثار من عمليات الوقوف", "التقليل من عمليات الوقوف", "استباق التغييرات فوتيرة السير"], c: [2, 3], img: "Screenshot (87).jpg" },
            { q: "هاد العلامة كتعنل على منعرجات متابعة:", o: ["على بعد 150 مترو", "على بعد 5 كيلومتر", "على طول 150 مترو", "على طول 5 كيلومتر"], c: [4], img: "Screenshot (88).jpg" },
            { q: "أثناء السير، لازم متوصلش نسبة الكحول في اللتر من الهواء المنبعث من الفم:", o: ["0,02 مليغرام", "0,05 مليغرام", "0,10 مليغرام"], c: [1], img: "Screenshot (89).jpg" },
            { q: "العلامة اللي كتدل على المكان ديال مؤشر التآكل موجودة في:", o: ["1", "2", "3", "4"], c: [1], img: "Screenshot (90).jpg" },
            { q: "بعد ما سلمت رخصة السياقة الملغاة بسبب فقدان النقط ما يمكنش ليا نجتاز الإمتحان من جديد إلا بعد:", o: ["3 شهور", "6 شهور", "9 شهور", "12 لشهر"], c: [4], img: "Screenshot (91).jpg" },
            { q: "فالمملكة المغربية، عدد القتلى ديال الراجليين كيمثل:", o: ["10 % من قتلى حوادث السير", "20 % من قتلى حوادث السير", "أكثر من 25 % من قتلى حوادث السير"], c: [3], img: "Screenshot (92).jpg" }
        ];

        let idx = 0;
        let userAnswers = Array(questions.length).fill().map(() => []);

        function render() {
            const q = questions[idx];
            document.getElementById('question-count').innerText = `السؤال ${idx + 1}/${questions.length}`;
            document.getElementById('question-text').innerText = q.q;
            document.getElementById('scenario-img').src = q.img;

            const opts = document.getElementById('options-list');
            opts.innerHTML = q.o.map((opt, i) => `
                <div onclick="toggle(${i + 1})" class="btn-option ${userAnswers[idx].includes(i + 1) ? 'selected' : ''}">
                    <span>${opt}</span>
                    <span class="font-bold">${i + 1}</span>
                </div>
            `).join('');

            const grid = document.getElementById('control-grid');
            grid.innerHTML = q.o.map((_, i) => `<button class="bg-[#1e293b] p-6 rounded font-bold ${userAnswers[idx].includes(i + 1) ? 'selected' : ''}">${i + 1}</button>`).join('');
        }

        function toggle(n) {
            const arr = userAnswers[idx];
            arr.includes(n) ? arr.splice(arr.indexOf(n), 1) : arr.push(n);
            render();
        }

        function checkAnswer() {
            console.log("Selected:", userAnswers[idx]);
            // Add your logic for feedback here
        }

        render();
    </script>
</body>
</html>
