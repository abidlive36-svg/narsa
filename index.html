<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Modern NARSA UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0b1120; color: #cbd5e1; font-family: sans-serif; }
        .bg-panel { background: #131b2e; border: 1px solid #1e293b; }
        .btn-option { border-bottom: 1px dashed #475569; }
        .selected { background: #1e3a8a; border-color: #3b82f6; }
        .correct { background: #065f46; }
        .wrong { background: #991b1b; }
    </style>
</head>
<body class="p-6">

    <div id="app" class="max-w-6xl mx-auto p-4 bg-panel rounded-lg">
        <div class="text-white text-left mb-4 font-bold">السؤال 1/1</div>
        
        <div class="grid grid-cols-4 gap-6">
            <!-- Left Controls -->
            <div class="col-span-1 space-y-4">
                <div class="p-4 bg-[#1e293b] rounded">
                    <div class="text-xs mb-2">مستوى الصوت</div>
                    <div class="h-2 bg-blue-600 rounded"></div>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <button class="bg-[#1e293b] p-6 rounded font-bold">2</button>
                    <button class="bg-[#1e293b] p-6 rounded font-bold">1</button>
                    <button class="bg-[#1e293b] p-6 rounded font-bold">4</button>
                    <button class="bg-[#1e293b] p-6 rounded font-bold">3</button>
                </div>
                <button class="w-full bg-emerald-600 p-4 rounded font-bold text-white">Valider</button>
            </div>

            <!-- Main Scenario Image Area -->
            <div class="col-span-3 bg-black rounded h-[300px] flex items-center justify-center text-gray-500">
                Scenario Image
            </div>
        </div>

        <!-- Options Section -->
        <div class="mt-6 p-6 bg-[#1e293b] rounded text-white">
            <h2 class="mb-6 font-bold text-lg">وضع صفائح تسجيل مزورة على المركبة بشكل متعمد كاتبتار جنحة كيتعاقب عليها:</h2>
            <div class="space-y-4">
                <div class="flex justify-between btn-option pb-2"><span>بعقوبة حبسية</span><span>1</span></div>
                <div class="flex justify-between btn-option pb-2"><span>بإيداع المركبة بالحجز</span><span>2</span></div>
                <div class="flex justify-between btn-option pb-2"><span>باتلاف المركبة</span><span>3</span></div>
                <div class="flex justify-between btn-option pb-2"><span>بمصادرة المركبة لفائدة الدولة</span><span>4</span></div>
            </div>
        </div>
    </div>
</body>
</html>
