<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>NARSA Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0b1120; color: #cbd5e1; font-family: sans-serif; }
        .glass { background: #1e293b; border: 1px solid #334155; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .answer-btn { background: #334155; border: 1px solid #475569; padding: 1.5rem; text-align: center; border-radius: 4px; font-weight: bold; }
        .selected { border: 2px solid #3b82f6 !important; }
        .correct { background: #065f46 !important; color: white !important; }
        .wrong { background: #991b1b !important; color: white !important; }
    </style>
</head>
<body class="p-8">

    <div id="app" class="max-w-6xl mx-auto grid grid-cols-12 gap-6"></div>

    <script>
        const questions = [
            { id: "q1", q: "وضع صفائح تسجيل مزورة على المركبة بشكل متعمد كاتبترا جنحة كيتعاقب عليها:", o: ["بعقوبة حبسية", "بإيداع المركبة بالحجز", "بإتلاف المركبة", "بمصادرة المركبة لفائدة الدولة"], c: [1, 2] },
            // Add more questions here following the same format
        ];

        let state = { idx: 0, userAnswers: new Array(questions.length).fill([]), isSubmitted: false };

        function render() {
            const q = questions[state.idx];
            const app = document.getElementById('app');
            app.innerHTML = `
                <!-- Sidebar (Left) -->
                <div class="col-span-12 md:col-span-3 flex flex-col gap-4">
                    <div class="glass p-4 rounded text-center">مستوى الصوت</div>
                    <input type="range" class="w-full mb-4">
                    <div class="btn-grid">
                        ${[2, 1, 4, 3].map(num => `
                            <button onclick="toggle(${num})" class="answer-btn ${state.userAnswers[state.idx].includes(num) ? 'selected' : ''}">
                                ${num}
                            </button>
                        `).join('')}
                    </div>
                    <button onclick="state.isSubmitted = true; render();" class="bg-emerald-600 text-white py-3 rounded font-bold mt-2">Valider</button>
                </div>

                <!-- Main Content (Right) -->
                <div class="col-span-12 md:col-span-9 flex flex-col gap-4">
                    <div class="glass p-2 rounded"><img src="${q.id}.webp" class="w-full rounded h-80 object-cover"></div>
                    <div class="glass p-6 rounded text-lg font-bold">${q.q}</div>
                    <div class="space-y-2">
                        ${q.o.map((opt, i) => {
                            const num = i + 1;
                            let cls = state.isSubmitted ? (q.c.includes(num) ? 'correct' : 'wrong') : '';
                            return `<div class="glass p-4 rounded border-b border-dashed flex justify-between ${cls}">
                                        <span>${opt}</span> <span>${num}</span>
                                    </div>`;
                        }).join('')}
                    </div>
                </div>`;
        }

        function toggle(num) {
            if (state.isSubmitted) return;
            let arr = state.userAnswers[state.idx];
            if (arr.includes(num)) state.userAnswers[state.idx] = arr.filter(x => x !== num);
            else state.userAnswers[state.idx].push(num);
            render();
        }

        render();
    </script>
</body>
</html>
